<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>裂縫調查相機</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: rgba(15,15,25,0.92);
    --border: rgba(255,255,255,0.12);
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #888;
    --active-bg: rgba(0,229,255,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#000; width:100vw; height:100vh; overflow:hidden; font-family:'SF Mono','Courier New',monospace; touch-action:manipulation; user-select:none; }
  #video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  #canvas-hidden { display:none; }
  #flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:50; transition:opacity 0.05s; }
  #flash.on { opacity:0.9; }
  #start-screen {
    position:absolute; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:100; gap:20px;
  }
  #start-screen h1 { color:var(--accent); font-size:20px; letter-spacing:4px; text-transform:uppercase; }
  #start-screen p { color:var(--muted); font-size:13px; text-align:center; line-height:2; padding:0 40px; }
  #btn-start {
    background:var(--accent); color:#000; border:none; border-radius:32px;
    padding:14px 44px; font-size:15px; font-weight:700; cursor:pointer; letter-spacing:2px;
    font-family:inherit;
  }
  #hud {
    position:absolute; top:0; left:0; right:0;
    background:linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
    padding:14px 14px 28px;
    z-index:20;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .field-block {
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:6px 10px;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .field-label {
    color:var(--accent);
    font-size:9px;
    letter-spacing:2px;
    text-transform:uppercase;
    font-weight:600;
  }
  .field-row {
    display:flex;
    align-items:center;
    gap:6px;
  }
  .field-value {
    color:var(--text);
    font-size:16px;
    font-weight:700;
    flex:1;
    text-align:center;
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .field-value.big { font-size:22px; }
  .mini-btn {
    width:28px; height:28px;
    border-radius:50%;
    border:1.5px solid rgba(255,255,255,0.3);
    background:rgba(255,255,255,0.08);
    color:#fff;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    transition:all 0.1s;
    line-height:1;
  }
  .mini-btn:active { background:rgba(0,229,255,0.3); border-color:var(--accent); transform:scale(0.9); }
  #bottom {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
    padding:10px 16px 36px;
    z-index:20;
  }
  #preview-bar {
    display:flex; gap:6px; overflow-x:auto; margin-bottom:12px;
    scrollbar-width:none; padding:2px;
  }
  #preview-bar::-webkit-scrollbar { display:none; }
  .thumb {
    flex-shrink:0; width:48px; height:48px;
    border-radius:6px; object-fit:cover;
    border:2px solid rgba(255,255,255,0.4);
    cursor:pointer;
  }
  #shot-info {
    text-align:center; color:var(--muted); font-size:11px;
    letter-spacing:1px; margin-bottom:10px;
  }
  #shutter-row {
    display:flex; align-items:center; justify-content:center; gap:24px;
  }
  #btn-reset {
    background:rgba(255,107,53,0.15);
    border:1.5px solid rgba(255,107,53,0.5);
    color:var(--accent2);
    border-radius:8px; padding:8px 16px;
    font-size:12px; cursor:pointer; letter-spacing:1px;
    font-family:inherit;
  }
  #btn-reset:active { background:rgba(255,107,53,0.35); }
  #btn-capture {
    width:72px; height:72px; border-radius:50%;
    border:4px solid #fff;
    background:rgba(255,255,255,0.15);
    cursor:pointer; position:relative; flex-shrink:0;
    transition:all 0.1s;
  }
  #btn-capture::after {
    content:''; position:absolute; inset:5px;
    border-radius:50%; background:#fff; transition:all 0.1s;
  }
  #btn-capture:active::after { inset:10px; background:#ddd; }
  #btn-flip {
    width:44px; height:44px; border-radius:50%;
    border:1.5px solid rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.08);
    color:#fff; font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  #btn-flip:active { background:rgba(255,255,255,0.2); }
  .field-block.active { border-color:var(--accent); background:var(--active-bg); }
</style>
</head>
<body>
<div id="start-screen">
  <h1>裂縫調查相機</h1>
  <p>授權相機後開始使用<br>上下鍵切換選項・空白鍵拍照</p>
  <button id="btn-start" onclick="startCamera()">開始使用</button>
</div>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas-hidden"></canvas>
<div id="flash"></div>
<div id="hud">
  <div class="field-block active" id="blk-0">
    <span class="field-label">樓層</span>
    <div class="field-row">
      <button class="mini-btn" onclick="step(0,-1)">-</button>
      <div class="field-value big" id="val-0">1F</div>
      <button class="mini-btn" onclick="step(0,1)">+</button>
    </div>
  </div>
  <div class="field-block" id="blk-1">
    <span class="field-label">裂縫數量</span>
    <div class="field-row">
      <button class="mini-btn" onclick="step(1,-1)">-</button>
      <div class="field-value" id="val-1">0條</div>
      <button class="mini-btn" onclick="step(1,1)">+</button>
    </div>
  </div>
  <div class="field-block" id="blk-2">
    <span class="field-label">裂縫方向</span>
    <div class="field-row">
      <button class="mini-btn" onclick="step(2,-1)">-</button>
      <div class="field-value" id="val-2">無</div>
      <button class="mini-btn" onclick="step(2,1)">+</button>
    </div>
  </div>
  <div class="field-block" id="blk-3">
    <span class="field-label">裂縫寬度</span>
    <div class="field-row">
      <button class="mini-btn" onclick="step(3,-1)">-</button>
      <div class="field-value" id="val-3">無</div>
      <button class="mini-btn" onclick="step(3,1)">+</button>
    </div>
  </div>
  <div class="field-block" id="blk-4" style="grid-column:1/-1">
    <span class="field-label">裂縫長度</span>
    <div class="field-row">
      <button class="mini-btn" onclick="step(4,-1)">-</button>
      <div class="field-value big" id="val-4">100cm以下</div>
      <button class="mini-btn" onclick="step(4,1)">+</button>
    </div>
  </div>
</div>
<div id="bottom">
  <div id="preview-bar"></div>
  <div id="shot-info">尚未拍攝</div>
  <div id="shutter-row">
    <button id="btn-reset" onclick="resetAll()">歸零</button>
    <button id="btn-capture" onclick="capturePhoto()"></button>
    <button id="btn-flip" onclick="flipCamera()">🔄</button>
  </div>
</div>
<script>
const FIELDS=[
  {label:'樓層',opts:['B4','B3','B2','B1','1F','2F','3F','4F','5F','6F','7F','8F','9F','10F','11F','12F','13F','14F','15F','16F','17F','18F','19F','20F'],idx:4},
  {label:'裂縫數量',opts:['0條','5條以下','10條以下','佈滿'],idx:0},
  {label:'裂縫方向',opts:['無','垂直','水平','45度'],idx:0},
  {label:'裂縫寬度',opts:['無','0.1mm','0.2mm','0.3mm','0.3mm以上'],idx:0},
  {label:'裂縫長度',opts:['100cm以下','100cm以上'],idx:0}
];
let activeField=0,stream=null,facingMode='environment',shotsTaken=0;
function getVal(i){return FIELDS[i].opts[FIELDS[i].idx];}
function renderAll(){FIELDS.forEach((f,i)=>{document.getElementById('val-'+i).textContent=getVal(i);document.getElementById('blk-'+i).classList.toggle('active',i===activeField);});}
function step(fi,d){const f=FIELDS[fi];f.idx=(f.idx+d+f.opts.length)%f.opts.length;activeField=fi;renderAll();}
function resetAll(){FIELDS[0].idx=4;FIELDS[1].idx=0;FIELDS[2].idx=0;FIELDS[3].idx=0;FIELDS[4].idx=0;renderAll();}
async function startCamera(){try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1920},height:{ideal:1080}},audio:false});document.getElementById('video').srcObject=stream;document.getElementById('start-screen').style.display='none';}catch(e){alert('無法存取相機：'+e.message);}}
async function flipCamera(){facingMode=facingMode==='environment'?'user':'environment';if(stream)stream.getTracks().forEach(t=>t.stop());try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode},audio:false});document.getElementById('video').srcObject=stream;}catch(e){alert('切換失敗');}}
function capturePhoto(){
  const v=document.getElementById('video'),c=document.getElementById('canvas-hidden'),x=c.getContext('2d');
  c.width=v.videoWidth||1280;c.height=v.videoHeight||720;
  x.drawImage(v,0,0,c.width,c.height);
  const lines=['樓層：'+getVal(0),'裂縫數量：'+getVal(1),'方向：'+getVal(2),'寬度：'+getVal(3),'長度：'+getVal(4)];
  const fs=Math.round(c.width*0.026),lh=Math.round(fs*1.55),pad=Math.round(fs*0.7);
  x.font='bold '+fs+'px Courier New,monospace';
  const mw=Math.max(...lines.map(l=>x.measureText(l).width));
  const bw=mw+pad*2,bh=lh*lines.length+pad*1.4,bx=20,by=20,br=10;
  x.shadowColor='rgba(0,0,0,0.6)';x.shadowBlur=12;
  x.fillStyle='rgba(0,0,0,0.82)';rr(x,bx,by,bw,bh,br);x.fill();x.shadowBlur=0;
  x.strokeStyle='rgba(255,255,255,0.7)';x.lineWidth=2;rr(x,bx,by,bw,bh,br);x.stroke();
  x.font='bold '+fs+'px Courier New,monospace';x.textAlign='left';
  lines.forEach((l,i)=>{
    const y=by+pad+lh*(i+0.78);
    const parts=l.split('：');
    x.fillStyle='rgba(0,229,255,0.7)';x.fillText(parts[0]+'：',bx+pad,y);
    const lw=x.measureText(parts[0]+'：').width;
    x.fillStyle='#ffffff';x.fillText(parts[1],bx+pad+lw,y);
  });
  const fl=document.getElementById('flash');fl.classList.add('on');setTimeout(()=>fl.classList.remove('on'),120);
  const d=c.toDataURL('image/jpeg',0.92);shotsTaken++;
  addThumb(d);
  document.getElementById('shot-info').textContent='已拍 '+shotsTaken+' 張・'+getVal(0)+' '+getVal(1);
  const a=document.createElement('a');a.href=d;a.download='crack_'+getVal(0)+'_'+Date.now()+'.jpg';a.click();
}
function addThumb(s){const b=document.getElementById('preview-bar'),i=document.createElement('img');i.src=s;i.className='thumb';i.onclick=()=>window.open(s,'_blank');b.appendChild(i);b.scrollLeft=b.scrollWidth;}
function rr(x,px,py,w,h,r){x.beginPath();x.moveTo(px+r,py);x.lineTo(px+w-r,py);x.quadraticCurveTo(px+w,py,px+w,py+r);x.lineTo(px+w,py+h-r);x.quadraticCurveTo(px+w,py+h,px+w-r,py+h);x.lineTo(px+r,py+h);x.quadraticCurveTo(px,py+h,px,py+h-r);x.lineTo(px,py+r);x.quadraticCurveTo(px,py,px+r,py);x.closePath();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'){step(activeField,-1);e.preventDefault();}
  if(e.key==='ArrowDown'){step(activeField,1);e.preventDefault();}
  if(e.key==='ArrowLeft'){activeField=(activeField-1+FIELDS.length)%FIELDS.length;renderAll();}
  if(e.key==='ArrowRight'){activeField=(activeField+1)%FIELDS.length;renderAll();}
  if(e.key===' '||e.key==='Enter')capturePhoto();
  if(e.key==='0')resetAll();
  if(e.key>='1'&&e.key<='5'){activeField=parseInt(e.key)-1;renderAll();}
});
renderAll();
</script>
</body>
</html>
